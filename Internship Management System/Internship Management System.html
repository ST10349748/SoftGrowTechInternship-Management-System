<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internship Management System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f0f0f,#1f1f1f);
    color: white;
}

/* Header */
header {
    text-align: center;
    padding: 20px;
    background: black;
}

/* Sections */
section {
    display: none;
    padding: 30px;
}

.active {
    display: block;
}

/* Forms */
form {
    max-width: 400px;
    margin: auto;
    display: flex;
    flex-direction: column;
}

input, textarea, button {
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    background: cyan;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #00cccc;
}

/* Dashboard */
.task {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

/* Links */
.link {
    text-align: center;
    cursor: pointer;
    color: cyan;
}
</style>
</head>

<body>

<header>
    <h1>🚀 Internship Management System</h1>
</header>

<!-- REGISTER -->
<section id="register" class="active">
    <h2 style="text-align:center;">Register</h2>
    <form onsubmit="register(event)">
        <input type="text" id="regUser" placeholder="Username" required>
        <input type="password" id="regPass" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>
    <p class="link" onclick="showPage('login')">Already have an account? Login</p>
</section>

<!-- LOGIN -->
<section id="login">
    <h2 style="text-align:center;">Login</h2>
    <form onsubmit="login(event)">
        <input type="text" id="logUser" placeholder="Username" required>
        <input type="password" id="logPass" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
    <h2>📊 Dashboard</h2>
    <button onclick="logout()">Logout</button>

    <h3>Submit Task</h3>
    <form onsubmit="addTask(event)">
        <input type="text" id="taskTitle" placeholder="Task Title" required>
        <textarea id="taskDesc" placeholder="Task Description"></textarea>
        <button type="submit">Submit Task</button>
    </form>

    <h3>Your Submissions</h3>
    <div id="taskList"></div>
</section>

<script>
// Navigation
function showPage(id) {
    document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// Register
function register(e) {
    e.preventDefault();

    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    localStorage.setItem("user", JSON.stringify({user, pass}));

    alert("Registered Successfully!");
    showPage("login");
}

// Login
function login(e) {
    e.preventDefault();

    let user = document.getElementById("logUser").value;
    let pass = document.getElementById("logPass").value;

    let stored = JSON.parse(localStorage.getItem("user"));

    if(stored && stored.user === user && stored.pass === pass) {
        localStorage.setItem("loggedIn", true);
        showPage("dashboard");
        loadTasks();
    } else {
        alert("Invalid Credentials");
    }
}

// Logout
function logout() {
    localStorage.removeItem("loggedIn");
    showPage("login");
}

// Protect dashboard
if(localStorage.getItem("loggedIn")) {
    showPage("dashboard");
}

// Task System
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function addTask(e) {
    e.preventDefault();

    let title = document.getElementById("taskTitle").value;
    let desc = document.getElementById("taskDesc").value;

    tasks.push({title, desc});
    localStorage.setItem("tasks", JSON.stringify(tasks));

    loadTasks();
}

// Load tasks
function loadTasks() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((t, i) => {
        let div = document.createElement("div");
        div.className = "task";
        div.innerHTML = `
            <h4>${t.title}</h4>
            <p>${t.desc}</p>
            <button onclick="deleteTask(${i})">Delete</button>
        `;
        list.appendChild(div);
    });
}

// Delete task
function deleteTask(i) {
    tasks.splice(i,1);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    loadTasks();
}

// Auto load
loadTasks();
</script>

</body>
</html>
